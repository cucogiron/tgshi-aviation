<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Restablecer contraseña — Senshi Aviation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;background:#0F1A2E;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px}
.logo{font-size:36px;font-weight:900;letter-spacing:.04em;margin-bottom:4px}
.sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:32px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;width:100%;max-width:380px}
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.45);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.05);color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border .15s}
.field input:focus{border-color:rgba(255,255,255,.3)}
.btn{width:100%;padding:14px;background:#fff;color:#0F1A2E;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:8px}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.msg{font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.msg.ok{color:#4ADE80}
.msg.err{color:#FF6B6B}
.msg.info{color:rgba(255,255,255,.6)}
.back{font-size:11px;color:rgba(255,255,255,.4);text-align:center;margin-top:16px;cursor:pointer;text-decoration:none;display:block}
.back:hover{color:rgba(255,255,255,.7)}
</style>
</head>
<body>

<div class="logo">TG-SHI</div>
<div class="sub">Senshi Aviation</div>

<div class="card" id="reset-form">
  <div style="font-size:14px;font-weight:600;text-align:center;margin-bottom:18px">Nueva contraseña</div>
  <div class="field">
    <label>Nueva contraseña</label>
    <input type="password" id="new-pw" placeholder="mínimo 4 caracteres" autocomplete="new-password">
  </div>
  <div class="field">
    <label>Confirmar contraseña</label>
    <input type="password" id="confirm-pw" placeholder="repite la contraseña" onkeydown="if(event.key==='Enter')doReset()">
  </div>
  <button class="btn" id="reset-btn" onclick="doReset()">Cambiar contraseña</button>
  <div class="msg" id="msg"></div>
</div>

<div class="card" id="done-card" style="display:none;text-align:center">
  <div style="font-size:32px;margin-bottom:12px">✅</div>
  <div style="font-size:14px;font-weight:600;margin-bottom:8px">Contraseña actualizada</div>
  <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px">Ya puedes ingresar con tu nueva contraseña.</div>
  <a class="btn" href="./" style="display:block;text-decoration:none;text-align:center">Ir al login</a>
</div>

<div class="card" id="error-card" style="display:none;text-align:center">
  <div style="font-size:32px;margin-bottom:12px">⚠️</div>
  <div style="font-size:14px;font-weight:600;margin-bottom:8px">Enlace inválido o expirado</div>
  <div style="font-size:12px;color:rgba(255,255,255,.5);margin-bottom:16px">El enlace de recuperación ha expirado o ya fue usado. Solicita uno nuevo.</div>
  <a class="btn" href="./" style="display:block;text-decoration:none;text-align:center">Volver al login</a>
</div>

<a class="back" href="./">← Volver al login</a>

<script>
// Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

// Get Worker URL from localStorage (same as main app)
const WORKER_URL = localStorage.getItem('tgshi_worker_url') || '';

if (!token) {
  document.getElementById('reset-form').style.display = 'none';
  document.getElementById('error-card').style.display = 'block';
}

async function doReset() {
  const pw = document.getElementById('new-pw').value;
  const pw2 = document.getElementById('confirm-pw').value;
  const msg = document.getElementById('msg');
  const btn = document.getElementById('reset-btn');

  if (!pw || pw.length < 4) { msg.textContent = 'Mínimo 4 caracteres'; msg.className = 'msg err'; return; }
  if (pw !== pw2) { msg.textContent = 'Las contraseñas no coinciden'; msg.className = 'msg err'; return; }

  if (!WORKER_URL) {
    msg.textContent = 'Worker no configurado en este navegador';
    msg.className = 'msg err';
    return;
  }

  btn.disabled = true;
  msg.textContent = 'Actualizando…';
  msg.className = 'msg info';

  try {
    const r = await fetch(WORKER_URL + '/reset-confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw })
    });
    const data = await r.json();

    if (data.ok) {
      document.getElementById('reset-form').style.display = 'none';
      document.getElementById('done-card').style.display = 'block';
    } else {
      if (data.error === 'Token expired or invalid') {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('error-card').style.display = 'block';
      } else {
        msg.textContent = data.error || 'Error';
        msg.className = 'msg err';
        btn.disabled = false;
      }
    }
  } catch (e) {
    msg.textContent = 'Error de conexión: ' + e.message;
    msg.className = 'msg err';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
